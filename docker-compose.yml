services:
  db:
    image: mysql:8.4
    container_name: pharmacy-db
    environment:
      MYSQL_DATABASE: pharmacy
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pharmacy-net

  backend:
    build:
      context: ./backend
    container_name: pharmacy-backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/pharmacy?createDatabaseIfNotExist=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - pharmacy-net

  frontend:
    build:
      context: ./frontend
    container_name: pharmacy-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pharmacy-net

networks:
  pharmacy-net:
    driver: bridge

volumes:
  mysql_data:
